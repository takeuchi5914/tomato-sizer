<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="トマトサイザー">
<meta name="theme-color" content="#1a0a0a">
<title>トマトサイザー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a0a0a;--card:#2a1515;--card-border:#3d2020;
  --accent:#e63946;--accent-light:#ff6b6b;
  --text:#f4e8e8;--text-muted:#b89999;
  --green:#4caf50;--surface:#221010;
}
html,body{
  font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body{max-width:480px;margin:0 auto;position:relative}

/* Buttons */
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#c0392b);
  color:#fff;border:none;border-radius:16px;
  padding:16px 32px;font-size:18px;font-weight:700;
  cursor:pointer;width:100%;letter-spacing:1px;
  box-shadow:0 4px 20px rgba(230,57,70,0.4);
  transition:transform 0.15s;font-family:inherit;
}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{
  background:transparent;color:var(--accent-light);
  border:2px solid var(--card-border);border-radius:16px;
  padding:14px 24px;font-size:16px;font-weight:600;
  cursor:pointer;width:100%;transition:all 0.15s;font-family:inherit;
}
.btn-secondary:active{background:rgba(255,255,255,0.05)}
.card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:16px;padding:20px;margin-bottom:12px;
}

/* Range slider styling */
input[type=range]{accent-color:var(--accent);width:100%}

/* Screen transitions */
.screen{display:none;animation:fadeIn 0.3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Camera */
#camera-screen{background:#000}
#camera-screen.active{display:flex;flex-direction:column}
#video-container{position:relative;flex:1;overflow:hidden}
#video-container video{width:100%;height:100%;object-fit:cover}

/* Guide ring */
.guide-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:200px;height:200px;border-radius:50%;
  pointer-events:none;
  transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.guide-bracket{
  position:absolute;width:28px;height:28px;pointer-events:none;
  transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.ready-label{
  position:absolute;top:calc(50% + 120px);left:50%;
  transform:translateX(-50%);
  background:rgba(76,175,80,0.9);color:#fff;
  padding:6px 20px;border-radius:20px;
  font-size:13px;font-weight:700;letter-spacing:1px;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 2px 12px rgba(76,175,80,0.4);
  transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.crosshair{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:40px;height:40px;pointer-events:none;
}
.crosshair::before,.crosshair::after{
  content:'';position:absolute;background:rgba(255,255,255,0.3);
}
.crosshair::before{top:50%;left:0;right:0;height:1px}
.crosshair::after{left:50%;top:0;bottom:0;width:1px}

/* Capture button */
.capture-btn{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#c0392b);
  border:4px solid #fff;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  transition:transform 0.15s;
}
.capture-btn:active{transform:scale(0.9)}

/* History items */
.history-item{
  display:flex;align-items:center;gap:16px;
}
.grade-badge{
  min-width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:16px;
}

/* Accuracy zone bar */
.zone-bar{position:relative;height:8px;border-radius:4px;background:var(--surface);margin-top:12px;overflow:hidden}
.zone-marker{
  position:absolute;top:-3px;width:14px;height:14px;
  border-radius:50%;border:2px solid #fff;
  transform:translateX(-50%);
  transition:left 0.2s,background 0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}

/* Install prompt */
.install-banner{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:12px;padding:14px 16px;margin-top:16px;
  font-size:13px;line-height:1.7;color:var(--text-muted);
  text-align:center;
}
.install-banner strong{color:var(--accent-light)}
</style>
</head>
<body>

<!-- ══════════════ HOME ══════════════ -->
<div id="home-screen" class="screen active">
  <div style="padding:40px 20px 20px">
    <div style="text-align:center;margin-bottom:40px">
      <div style="font-size:56px;margin-bottom:8px">🍅</div>
      <h1 style="font-size:28px;font-weight:900;letter-spacing:2px;
        background:linear-gradient(135deg,var(--accent-light),#ff9999);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent">
        トマトサイザー
      </h1>
      <p style="color:var(--text-muted);margin-top:8px;font-size:14px">
        カメラで撮影 → 直径自動推定
      </p>
    </div>

    <!-- Distance -->
    <div class="card" style="margin-bottom:24px">
      <label style="font-size:14px;color:var(--text-muted);display:block;margin-bottom:12px">
        📏 撮影距離（トマトまでの距離）
      </label>
      <div style="display:flex;align-items:center;gap:16px">
        <input type="range" id="distance-slider" min="15" max="60" value="30">
        <span id="distance-value" style="font-size:24px;font-weight:800;min-width:80px;text-align:right;transition:color 0.3s">30 cm</span>
      </div>
      <!-- Zone bar -->
      <div class="zone-bar">
        <div style="position:absolute;left:0;width:11.1%;height:100%;background:rgba(255,100,100,0.4);border-radius:4px 0 0 4px"></div>
        <div style="position:absolute;left:11.1%;width:11.1%;height:100%;background:rgba(255,193,7,0.4)"></div>
        <div style="position:absolute;left:22.2%;width:22.2%;height:100%;background:rgba(76,175,80,0.5)"></div>
        <div style="position:absolute;left:44.4%;width:11.1%;height:100%;background:rgba(255,193,7,0.4)"></div>
        <div style="position:absolute;left:55.6%;right:0;height:100%;background:rgba(255,100,100,0.4);border-radius:0 4px 4px 0"></div>
        <div id="zone-marker" class="zone-marker" style="left:33.3%;background:var(--green)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text-muted)">
        <span>15cm</span>
        <span style="color:var(--green);font-weight:700">◀ 25〜35cm 高精度 ▶</span>
        <span>60cm</span>
      </div>
      <div id="accuracy-badge" style="margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;transition:all 0.3s ease"></div>
    </div>

    <div id="camera-error" style="display:none" class="card" style="background:#3d1515;border-color:#5a2020;margin-bottom:24px;font-size:14px"></div>

    <button class="btn-primary" onclick="startCamera()">📸 撮影して計測する</button>
    <div style="margin-top:16px">
      <button class="btn-secondary" onclick="showHistory()">📋 計測履歴（<span id="record-count">0</span>件）</button>
    </div>

    <!-- Quick Stats -->
    <div id="quick-stats" class="card" style="margin-top:24px;display:none;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">
      <div>
        <div style="font-size:12px;color:var(--text-muted)">計測数</div>
        <div id="stat-count" style="font-size:24px;font-weight:800;color:var(--accent-light)">0</div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--text-muted)">平均径</div>
        <div style="font-size:24px;font-weight:800;color:var(--accent-light)"><span id="stat-avg">0</span><span style="font-size:12px;font-weight:400">mm</span></div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--text-muted)">最多等級</div>
        <div id="stat-grade" style="font-size:24px;font-weight:800;color:var(--accent-light)">-</div>
      </div>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:32px;line-height:1.8">
      ※ 基準物なしの推定です。撮影距離の設定が精度に影響します。<br>目安としてご活用ください。
    </p>

    <!-- Install hint -->
    <div id="install-hint" class="install-banner" style="display:none">
      <strong>📲 ホーム画面に追加</strong>するとアプリのように使えます。<br>
      ブラウザメニュー → <strong>「ホーム画面に追加」</strong>をタップ
    </div>
  </div>
</div>

<!-- ══════════════ CAMERA ══════════════ -->
<div id="camera-screen" class="screen" style="height:100vh;height:100dvh">
  <div id="video-container">
    <video id="camera-video" autoplay playsinline muted></video>
    <!-- Guide ring -->
    <div id="guide-ring" class="guide-ring"></div>
    <!-- Corner brackets -->
    <div id="bracket-tl" class="guide-bracket" style="top:calc(50% - 116px);left:calc(50% - 116px)"></div>
    <div id="bracket-tr" class="guide-bracket" style="top:calc(50% - 116px);right:calc(50% - 116px)"></div>
    <div id="bracket-bl" class="guide-bracket" style="bottom:calc(50% - 116px);left:calc(50% - 116px)"></div>
    <div id="bracket-br" class="guide-bracket" style="bottom:calc(50% - 116px);right:calc(50% - 116px)"></div>
    <!-- Crosshair for non-optimal -->
    <div id="crosshair" class="crosshair" style="display:none"></div>
    <!-- Ready label -->
    <div id="ready-label" class="ready-label" style="opacity:0;transform:translateX(-50%) translateY(10px)">📐 高精度モード</div>

    <!-- Top guide -->
    <div style="position:absolute;top:16px;left:0;right:0;text-align:center;color:#fff;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,0.8)">
      トマトを円の中に合わせてください
    </div>
    <!-- Distance badge -->
    <div style="position:absolute;top:44px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:6px">
      <div id="cam-distance" style="background:rgba(0,0,0,0.6);border-radius:20px;padding:6px 16px;color:#fff;font-size:14px;font-weight:700">📏 30cm</div>
      <div id="cam-accuracy" style="border-radius:16px;padding:4px 14px;color:#fff;font-size:12px;font-weight:700;transition:background 0.3s ease"></div>
    </div>
  </div>
  <!-- Bottom controls -->
  <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 20px 40px;display:flex;justify-content:center;align-items:center;gap:24px;background:linear-gradient(transparent,rgba(0,0,0,0.8))">
    <button onclick="closeCamera()" style="background:rgba(255,255,255,0.15);border:none;border-radius:12px;padding:12px 20px;color:#fff;font-size:14px;cursor:pointer;font-family:inherit">✕ 戻る</button>
    <button id="capture-btn" class="capture-btn" onclick="capture()"></button>
  </div>
  <canvas id="capture-canvas" style="display:none"></canvas>
</div>

<!-- ══════════════ RESULT ══════════════ -->
<div id="result-screen" class="screen">
  <div style="padding:20px 20px 40px">
    <h2 style="text-align:center;font-size:20px;font-weight:800;margin-bottom:24px;color:var(--accent-light)">計測結果</h2>
    
    <!-- No detection -->
    <div id="no-detection" class="card" style="display:none;text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:16px">🔍</div>
      <p style="color:var(--text-muted);font-size:16px">トマトを検出できませんでした</p>
      <p style="color:var(--text-muted);font-size:13px;margin-top:8px">トマトが画面中央に写るように撮影してください</p>
    </div>

    <!-- Detection result -->
    <div id="detection-result" style="display:none">
      <div style="border-radius:16px;overflow:hidden;margin-bottom:20px">
        <img id="result-image" style="width:100%;display:block" alt="撮影画像">
      </div>
      <div id="result-card" class="card" style="text-align:center"></div>
      <!-- Note -->
      <div class="card" style="margin-top:16px">
        <label style="font-size:14px;color:var(--text-muted);display:block;margin-bottom:8px">📝 メモ（任意）</label>
        <input type="text" id="result-note" placeholder="例: ハウス1号棟 3列目"
          style="width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:16px;outline:none;font-family:inherit">
      </div>
      <button class="btn-primary" style="margin-top:16px" onclick="saveRecord()">💾 記録を保存する</button>
    </div>

    <div style="display:flex;gap:12px;margin-top:16px">
      <button class="btn-secondary" style="flex:1" onclick="retakePhoto()">📸 再撮影</button>
      <button class="btn-secondary" style="flex:1" onclick="showScreen('home')">🏠 ホームへ</button>
    </div>
  </div>
</div>

<!-- ══════════════ HISTORY ══════════════ -->
<div id="history-screen" class="screen">
  <div style="padding:20px 20px 40px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2 style="font-size:20px;font-weight:800;color:var(--accent-light)">📋 計測履歴</h2>
      <button onclick="showScreen('home')" style="background:transparent;border:1px solid var(--card-border);color:var(--text-muted);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit">✕ 閉じる</button>
    </div>
    <div id="history-empty" class="card" style="text-align:center;padding:40px">
      <div style="font-size:40px;margin-bottom:12px">📭</div>
      <p style="color:var(--text-muted)">計測記録がありません</p>
    </div>
    <div id="history-content" style="display:none">
      <button class="btn-primary" style="margin-bottom:20px;font-size:16px;padding:14px 24px" onclick="exportCsv()">📥 CSVダウンロード</button>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let records = [];
let distanceCm = 30;
let currentStream = null;
let lastResult = null;

const GRADES = [
  {name:'3L',minDiam:93,color:'#c0392b'},
  {name:'2L',minDiam:83,color:'#e74c3c'},
  {name:'L',minDiam:73,color:'#ff6b6b'},
  {name:'M',minDiam:63,color:'#ff8787'},
  {name:'S',minDiam:53,color:'#ffa8a8'},
  {name:'SS',minDiam:0,color:'#ffc9c9'},
];

function getGrade(mm){
  for(const g of GRADES) if(mm>=g.minDiam) return g;
  return GRADES[GRADES.length-1];
}
function pad(n){return String(n).padStart(2,'0')}
function fmtDate(d){return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}

// ═══════════════════════════════════════
// Persistence
// ═══════════════════════════════════════
function loadRecords(){
  try{records=JSON.parse(localStorage.getItem('tomato_records'))||[]}catch(e){records=[]}
}
function saveRecords(){
  try{localStorage.setItem('tomato_records',JSON.stringify(records))}catch(e){}
}

// ═══════════════════════════════════════
// Screen management
// ═══════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name+'-screen').classList.add('active');
  if(name==='home') updateHome();
}

// ═══════════════════════════════════════
// Home screen
// ═══════════════════════════════════════
function updateHome(){
  document.getElementById('record-count').textContent=records.length;
  const stats=document.getElementById('quick-stats');
  if(records.length>0){
    stats.style.display='grid';
    document.getElementById('stat-count').textContent=records.length;
    document.getElementById('stat-avg').textContent=Math.round(records.reduce((s,r)=>s+r.diamMm,0)/records.length);
    const counts={};
    records.forEach(r=>counts[r.grade]=(counts[r.grade]||0)+1);
    document.getElementById('stat-grade').textContent=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-';
  }else{
    stats.style.display='none';
  }
}

function updateDistanceUI(){
  const pct=((distanceCm-15)/(60-15))*100;
  const isOpt=distanceCm>=25&&distanceCm<=35;
  const isGood=distanceCm>=20&&distanceCm<=40;
  const color=isOpt?'var(--green)':isGood?'#ffc107':'var(--accent-light)';

  document.getElementById('distance-value').textContent=distanceCm+' cm';
  document.getElementById('distance-value').style.color=color;

  const marker=document.getElementById('zone-marker');
  marker.style.left=pct+'%';
  marker.style.background=isOpt?'var(--green)':isGood?'#ffc107':'#ff6b6b';

  const badge=document.getElementById('accuracy-badge');
  if(isOpt){
    badge.style.background='rgba(76,175,80,0.15)';badge.style.border='1px solid rgba(76,175,80,0.4)';badge.style.color='#4caf50';
    badge.textContent='✅ 高精度な距離です';
  }else if(isGood){
    badge.style.background='rgba(255,193,7,0.12)';badge.style.border='1px solid rgba(255,193,7,0.4)';badge.style.color='#ffc107';
    badge.textContent='⚠️ やや精度が下がります';
  }else{
    badge.style.background='rgba(255,100,100,0.12)';badge.style.border='1px solid rgba(255,100,100,0.4)';badge.style.color='#ff6b6b';
    badge.textContent='❌ 精度が低い距離です（25〜35cmを推奨）';
  }
}

document.getElementById('distance-slider').addEventListener('input',function(e){
  distanceCm=Number(e.target.value);
  updateDistanceUI();
  updateCameraGuide();
});

// ═══════════════════════════════════════
// Camera
// ═══════════════════════════════════════
function updateCameraGuide(){
  const isOpt=distanceCm>=25&&distanceCm<=35;
  const isGood=distanceCm>=20&&distanceCm<=40;

  // Guide ring
  const ring=document.getElementById('guide-ring');
  if(isOpt){
    ring.style.border='3px solid rgba(76,175,80,1)';
    ring.style.opacity='1';
    ring.style.boxShadow='0 0 24px rgba(76,175,80,0.6),inset 0 0 24px rgba(76,175,80,0.15)';
    ring.style.transform='translate(-50%,-50%) scale(1)';
  }else if(isGood){
    ring.style.border='2px dashed rgba(255,193,7,0.7)';
    ring.style.opacity='0.4';
    ring.style.boxShadow='none';
    ring.style.transform='translate(-50%,-50%) scale(0.95)';
  }else{
    ring.style.border='2px dashed rgba(255,255,255,0.2)';
    ring.style.opacity='0';
    ring.style.boxShadow='none';
    ring.style.transform='translate(-50%,-50%) scale(0.95)';
  }

  // Brackets
  const bColor='rgba(76,175,80,1)';
  const bOp=isOpt?'1':'0';
  const bScale=isOpt?'scale(1)':'scale(0.7)';
  const brackets=[
    {id:'bracket-tl',bT:`3px solid ${bColor}`,bL:`3px solid ${bColor}`,br:'6px 0 0 0'},
    {id:'bracket-tr',bT:`3px solid ${bColor}`,bR:`3px solid ${bColor}`,br:'0 6px 0 0'},
    {id:'bracket-bl',bB:`3px solid ${bColor}`,bL:`3px solid ${bColor}`,br:'0 0 0 6px'},
    {id:'bracket-br',bB:`3px solid ${bColor}`,bR:`3px solid ${bColor}`,br:'0 0 6px 0'},
  ];
  brackets.forEach(b=>{
    const el=document.getElementById(b.id);
    el.style.borderTop=b.bT||'none';el.style.borderBottom=b.bB||'none';
    el.style.borderLeft=b.bL||'none';el.style.borderRight=b.bR||'none';
    el.style.borderRadius=b.br;
    el.style.opacity=bOp;el.style.transform=bScale;
  });

  // Crosshair
  document.getElementById('crosshair').style.display=(!isOpt&&!isGood)?'block':'none';

  // Ready label
  const label=document.getElementById('ready-label');
  label.style.opacity=isOpt?'1':'0';
  label.style.transform=isOpt?'translateX(-50%) translateY(0)':'translateX(-50%) translateY(10px)';

  // Distance badge on camera
  document.getElementById('cam-distance').textContent='📏 '+distanceCm+'cm';
  const camAcc=document.getElementById('cam-accuracy');
  if(isOpt){camAcc.style.background='rgba(76,175,80,0.85)';camAcc.textContent='✅ 高精度'}
  else if(isGood){camAcc.style.background='rgba(255,193,7,0.85)';camAcc.textContent='⚠️ やや精度低下'}
  else{camAcc.style.background='rgba(255,100,100,0.7)';camAcc.textContent='❌ 精度が低い距離です'}
}

async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}}
    });
    currentStream=stream;
    const video=document.getElementById('camera-video');
    video.srcObject=stream;
    video.play();
    showScreen('camera');
    updateCameraGuide();
  }catch(err){
    alert('カメラにアクセスできません: '+err.message);
  }
}

function closeCamera(){
  if(currentStream){currentStream.getTracks().forEach(t=>t.stop());currentStream=null}
  showScreen('home');
}

// ═══════════════════════════════════════
// Image analysis
// ═══════════════════════════════════════
function analyzeImage(canvas,ctx,dist){
  const w=canvas.width,h=canvas.height;
  const imgData=ctx.getImageData(0,0,w,h);
  const d=imgData.data;
  const mask=new Uint8Array(w*h);

  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
    const sat=mx===0?0:(mx-mn)/mx;
    const isRed=r>80&&r>g*1.1&&r>b*1.4&&sat>0.2;
    const isGreen=g>60&&g>b*1.3&&sat>0.15&&r>40;
    const isOrange=r>120&&g>60&&g<r&&b<g&&sat>0.25;
    if(isRed||isGreen||isOrange) mask[i/4]=1;
  }

  let top=h,bot=0,left=w,right=0,px=0;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    if(mask[y*w+x]){px++;if(y<top)top=y;if(y>bot)bot=y;if(x<left)left=x;if(x>right)right=x}
  }
  if(px<100)return null;

  const bw=right-left,bh=bot-top,diam=Math.max(bw,bh);
  const fov=60*Math.PI/180;
  const sensorW=2*dist*Math.tan(fov/2);
  const mmPx=(sensorW*10)/w;

  return{diamMm:Math.round(diam*mmPx),diamPx:diam,bbox:{top,left,width:bw,height:bh},px};
}

function capture(){
  const video=document.getElementById('camera-video');
  const canvas=document.getElementById('capture-canvas');
  canvas.width=video.videoWidth||640;
  canvas.height=video.videoHeight||480;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  const result=analyzeImage(canvas,ctx,distanceCm);
  if(currentStream){currentStream.getTracks().forEach(t=>t.stop());currentStream=null}

  if(result){
    const grade=getGrade(result.diamMm);
    // Draw overlay
    ctx.strokeStyle=grade.color;ctx.lineWidth=3;
    ctx.strokeRect(result.bbox.left,result.bbox.top,result.bbox.width,result.bbox.height);
    const cx=result.bbox.left+result.bbox.width/2,cy=result.bbox.top+result.bbox.height/2;
    ctx.beginPath();ctx.arc(cx,cy,result.diamPx/2,0,Math.PI*2);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);

    lastResult={diamMm:result.diamMm,grade:grade.name,gradeColor:grade.color,
      imageDataUrl:canvas.toDataURL('image/jpeg',0.7),timestamp:new Date()};

    showResult(true);
  }else{
    lastResult=null;
    showResult(false);
  }
}

// ═══════════════════════════════════════
// Result screen
// ═══════════════════════════════════════
function showResult(detected){
  showScreen('result');
  document.getElementById('result-note').value='';
  if(!detected){
    document.getElementById('no-detection').style.display='block';
    document.getElementById('detection-result').style.display='none';
    return;
  }
  document.getElementById('no-detection').style.display='none';
  document.getElementById('detection-result').style.display='block';
  document.getElementById('result-image').src=lastResult.imageDataUrl;

  const grade=getGrade(lastResult.diamMm);
  let scaleHtml='<div style="margin-top:20px;display:flex;gap:4px">';
  GRADES.forEach(g=>{
    const isCurrent=g.name===grade.name;
    scaleHtml+=`<div style="flex:1;padding:6px 0;border-radius:6px;font-size:11px;text-align:center;
      font-weight:${isCurrent?900:400};
      background:${isCurrent?g.color+'33':'transparent'};
      color:${isCurrent?g.color:'var(--text-muted)'};
      border:${isCurrent?'1px solid '+g.color+'66':'1px solid transparent'}">${g.name}</div>`;
  });
  scaleHtml+='</div>';

  document.getElementById('result-card').innerHTML=`
    <div style="display:flex;justify-content:center;align-items:baseline;gap:8px">
      <span style="font-size:56px;font-weight:900;color:${grade.color}">${lastResult.diamMm}</span>
      <span style="font-size:20px;color:var(--text-muted)">mm</span>
    </div>
    <div style="display:inline-block;margin-top:12px;padding:8px 32px;
      background:${grade.color}22;border:2px solid ${grade.color};border-radius:24px;
      font-size:24px;font-weight:900;color:${grade.color};letter-spacing:2px">${grade.name}</div>
    ${scaleHtml}`;
  document.getElementById('result-card').style.background=`linear-gradient(135deg,var(--card),var(--surface))`;
  document.getElementById('result-card').style.border=`2px solid ${grade.color}44`;
}

function saveRecord(){
  if(!lastResult)return;
  records.unshift({
    id:Date.now(),
    diamMm:lastResult.diamMm,
    grade:lastResult.grade,
    note:document.getElementById('result-note').value,
    timestamp:lastResult.timestamp.toISOString()
  });
  saveRecords();
  showScreen('home');
}

function retakePhoto(){
  lastResult=null;
  startCamera();
}

// ═══════════════════════════════════════
// History
// ═══════════════════════════════════════
function showHistory(){
  showScreen('history');
  if(records.length===0){
    document.getElementById('history-empty').style.display='block';
    document.getElementById('history-content').style.display='none';
    return;
  }
  document.getElementById('history-empty').style.display='none';
  document.getElementById('history-content').style.display='block';

  let html='';
  records.forEach(r=>{
    const g=getGrade(r.diamMm);
    const d=new Date(r.timestamp);
    html+=`<div class="card history-item">
      <div class="grade-badge" style="background:${g.color}22;border:2px solid ${g.color};color:${g.color}">${g.name}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:18px">${r.diamMm}mm</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${fmtDate(d)}${r.note?' · '+r.note:''}</div>
      </div>
      <button onclick="deleteRecord(${r.id})" style="background:transparent;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:8px">🗑</button>
    </div>`;
  });
  document.getElementById('history-list').innerHTML=html;
}

function deleteRecord(id){
  records=records.filter(r=>r.id!==id);
  saveRecords();
  showHistory();
}

function exportCsv(){
  if(records.length===0)return;
  const bom='\uFEFF';
  const header='日時,直径(mm),等級,メモ\n';
  const rows=records.map(r=>{
    const d=new Date(r.timestamp);
    return `${fmtDate(d)},${r.diamMm},${r.grade},"${(r.note||'').replace(/"/g,'""')}"`;
  }).join('\n');
  const blob=new Blob([bom+header+rows],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`トマト計測_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}
